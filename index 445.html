let questions=[], answers=[], current=0, mode='study', filterWeek=0, started=false, reviewMode=false;

function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startQuiz(){
  let pool=filterWeek===0?ALL_Q:ALL_Q.filter(q=>q.w===filterWeek);
  questions=shuffle(pool).slice(0,Math.min(100,pool.length));
  answers=new Array(questions.length).fill(null);
  current=0; started=true; reviewMode=false;
  render();
}

function selectAnswer(i){
  if(answers[current]!==null)return;
  answers[current]=i;
  render();
}

function next(){if(current<questions.length-1){current++;render();}}
function prev(){if(current>0){current--;render();}}
function goTo(i){current=i;render();}
function getScore(){return answers.reduce((s,a,i)=>s+(a===questions[i].a?1:0),0);}
function getCatScore(){
  const c={};
  questions.forEach((q,i)=>{
    if(!c[q.w])c[q.w]={correct:0,total:0};
    c[q.w].total++;
    if(answers[i]===q.a)c[q.w].correct++;
  });
  return c;
}
function weekName(w){return{1:'History & Arts',2:'Norms & Values',3:'Trade & Economy',4:'Colonial Admin',5:'Re-orientation',6:'Political Evo.'}[w]||'Week '+w;}

function shareQuiz(){
  const url=window.location.href.split('?')[0];

}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none',2500);
}

function render(){
  const app=document.getElementById('app');
  if(!started){renderStart(app);return;}
  const done=answers.filter(a=>a!==null).length;
  if(done===questions.length&&!reviewMode&&current>=questions.length){renderResults(app);return;}
  renderQuestion(app);
}

  <div class="mode-row">
    <button class="mode-btn${mode==='study'?' active':''}" onclick="mode='study';document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">Study mode</button>
    <button class="mode-btn${mode==='exam'?' active':''}" onclick="mode='exam';document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">Exam mode</button>
  </div>
  <div class="filter-row">
    <label>Filter by week:</label>
    <select onchange="filterWeek=parseInt(this.value)">
      <option value="0">All weeks (100 questions)</option>
      <option value="1">Week 1 — Nigerian History, Culture &amp; Arts</option>
      <option value="2">Week 2 — Individual Norms and Values</option>
      <option value="3">Week 3 — Trade, Economy &amp; Self-reliance</option>
      <option value="4">Week 4 — Nigeria under Colonial Administration</option>
      <option value="5">Week 5 — Re-orientation &amp; National Values</option>
      <option value="6">Week 6 — Evolution as a Political Unit</option>
    </select>
  </div>
  <div class="info-box">
    <p><strong>Study mode</strong> — see the correct answer immediately after each question.</p>
    <p><strong>Exam mode</strong> — answer all questions first, then view your score at the end.</p>
  </div>
  <button class="btn-primary" onclick="startQuiz()">Start quiz →</button>
</div>`;
}

function renderQuestion(app){
  const q=questions[current];
  const ans=answers[current];
  const answered=ans!==null;
  const total=questions.length;
  const done=answers.filter(a=>a!==null).length;
  const pct=Math.round((done/total)*100);
  const showAnswer=(answered&&mode==='study')||reviewMode;

  const opts=q.o.map((o,i)=>{
    let cls='opt';
    if(showAnswer){
      if(i===q.a)cls+=' correct';
      else if(i===ans&&ans!==q.a)cls+=' wrong';
    }
    return`<button class="${cls}"${(answered||reviewMode)?' disabled':''} onclick="selectAnswer(${i})">${'ABCD'[i]}. ${o}</button>`;
  }).join('');

  let feedback='';
  if(showAnswer){
    const ok=ans===q.a;
    feedback=`<div class="feedback ${ok?'correct':'wrong'}">${ok?'✓ Correct!':'✗ Incorrect — correct answer: '+'ABCD'[q.a]+'. '+q.o[q.a]}</div>`;
  }

  const dots=questions.map((_,i)=>{
    let cls='dot';
    if(answers[i]!==null) cls+=answers[i]===questions[i].a?' answered-correct':' answered-wrong';
    if(i===current)cls+=' current';
    return`<div class="${cls}" onclick="goTo(${i})" title="Q${i+1}">${i+1}</div>`;
  }).join('');

  const allDone=done===total;
  let navRight='';
  if(current<total-1) navRight=`<button class="btn-primary" onclick="next()">Next →</button>`;
  else if(allDone&&!reviewMode) navRight=`<button class="btn-primary" onclick="current=total;render()">See results →</button>`;

  const reviewBanner=reviewMode?`<div class="review-banner">📋 Review mode — all answers are shown. <a href="#" onclick="started=false;reviewMode=false;render();return false" style="color:#664d03;font-weight:600">← Back to start</a></div>`:'';

  app.innerHTML=`
${reviewBanner}
<div class="progress-wrap">
  <div class="progress-meta"><span>Q${current+1} of ${total}</span><span>${done} answered · ${pct}%</span></div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
</div>
<div class="stats">
  <div class="stat">Week <strong>${q.w}</strong></div>
  <div class="stat">${weekName(q.w)}</div>
  ${mode==='study'&&!reviewMode?`<div class="stat">Score <strong>${getScore()}/${Math.max(done,1)}</strong></div>`:''}
</div>
<div class="dot-map">${dots}</div>
<div class="card">
  <div class="q-meta">Question ${current+1} · Week ${q.w}</div>
  <div class="q-text">${q.q}</div>
  <div class="options">${opts}</div>
  ${feedback}
</div>
<div class="nav">
  <div style="display:flex;gap:8px">
    ${current>0?`<button class="btn-secondary" onclick="prev()">← Prev</button>`:''}
    ${navRight}
  </div>
  ${!reviewMode?`<button class="btn-share" onclick="shareQuiz()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Share</button>`:''}
</div>`;
}

function renderResults(app){
  const score=getScore();
  const total=questions.length;
  const pct=Math.round((score/total)*100);
  const grade=pct>=90?'Excellent! 🎉':pct>=70?'Good work! 💪':pct>=50?'Keep studying 📖':'More revision needed 📚';
  const cats=getCatScore();
  const catRows=Object.entries(cats).sort((a,b)=>+a[0]-+b[0]).map(([w,s])=>{
    const p=Math.round((s.correct/s.total)*100);
    return`<div class="cat-row">
      <span class="cat-name">Week ${w}</span>
      <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${p}%"></div></div>
      <span class="cat-score">${s.correct}/${s.total}</span>
    </div>`;
  }).join('');

  app.innerHTML=`
<div class="card" style="margin-top:1rem">
  <div class="results-wrap">
    <h2 class="grade">${grade}</h2>
    <p class="grade-sub">You completed the GNS 112 quiz</p>
    <div class="score-ring">
      <span class="score-big">${pct}%</span>
      <span class="score-sub">${score} / ${total}</span>
    </div>
    <div class="cat-table">
      <p class="cat-label">Performance by week</p>
      ${catRows}
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:1.75rem;flex-wrap:wrap">
      <button class="btn-primary" onclick="started=false;render()">Try again</button>
      <button class="btn-secondary" onclick="reviewMode=true;current=0;render()">Review answers</button>
      <button class="btn-share" onclick="shareQuiz()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Share</button>
    </div>
  </div>
</div>`;
}

render();
</script>
</body>
</html>
